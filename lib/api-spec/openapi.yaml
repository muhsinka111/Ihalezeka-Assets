    # ─── Documents ───────────────────────────────────────────────────────────────
    Document:
      type: object
      required: [id, name, folder, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        folder:
          type: string
        fileUrl:
          type: ["string", "null"]
        validUntil:
          type: ["string", "null"]
          format: date
        status:
          type: string
          enum: [valid, expiring_soon, expired, pending]
        createdAt:
          type: string
          format: date-time

    DocumentInput:
      type: object
      required: [name, folder]
      properties:
        name:
          type: string
        folder:
          type: string
        fileUrl:
          type: string
        validUntil:
          type: string
          format: date

    DocumentFolder:
      type: object
      required: [name, count]
      properties:
        name:
          type: string
        count:
          type: integer
        expiringCount:
          type: integer

    # ─── Proposals ───────────────────────────────────────────────────────────────
    Proposal:
      type: object
      required: [id, tenderId, status, createdAt]
      properties:
        id:
          type: integer
        tenderId:
          type: integer
        tenderTitle:
          type: ["string", "null"]
        contentJson:
          type: ["string", "null"]
          description: JSON-encoded proposal sections
        status:
          type: string
          enum: [draft, finalized, submitted]
        version:
          type: integer
          default: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProposalInput:
      type: object
      required: [tenderId]
      properties:
        tenderId:
          type: integer
        contentJson:
          type: string

    ProposalUpdate:
      type: object
      properties:
        contentJson:
          type: string
        status:
          type: string
          enum: [draft, finalized, submitted]

    # ─── Competitors ─────────────────────────────────────────────────────────────
    Competitor:
      type: object
      required: [id, name, wonTenders, avgDiscountRate, encounters]
      properties:
        id:
          type: integer
        name:
          type: string
        wonTenders:
          type: integer
        avgDiscountRate:
          type: number
          description: Average discount (kırım) percentage
        encounters:
          type: integer
          description: How many times this competitor appeared in same tenders

    CompetitorInsights:
      type: object
      required: [aiInsight, categoryWinRates]
      properties:
        aiInsight:
          type: string
          description: AI-generated competitor analysis text
        categoryWinRates:
          type: array
          items:
            $ref: "#/components/schemas/CategoryPerformance"

    # ─── Money Flow ──────────────────────────────────────────────────────────────
    CategorySpend:
      type: object
      required: [category, amount, percentage]
      properties:
        category:
          type: string
        amount:
          type: number
        percentage:
          type: number

    AgencySpend:
      type: object
      required: [agencyName, totalSpend, tenderCount]
      properties:
        agencyName:
          type: string
        agencyLogoUrl:
          type: ["string", "null"]
        totalSpend:
          type: number
        tenderCount:
          type: integer
        il:
          type: string

    # ─── Reports ─────────────────────────────────────────────────────────────────
    ReportsSummary:
      type: object
      required: [totalApplications, wonCount, lostCount, pendingCount, successRate, aiSummary]
      properties:
        totalApplications:
          type: integer
        wonCount:
          type: integer
        lostCount:
          type: integer
        pendingCount:
          type: integer
        successRate:
          type: number
        totalWonValue:
          type: number
        aiSummary:
          type: string

    MonthlyApplications:
      type: object
      required: [month, applications, wins]
      properties:
        month:
          type: string
        applications:
          type: integer
        wins:
          type: integer

    CategoryPerformance:
      type: object
      required: [category, applications, wins, winRate]
      properties:
        category:
          type: string
        applications:
          type: integer
        wins:
          type: integer
        winRate:
          type: number

    # ─── API Keys ─────────────────────────────────────────────────────────────────
    ApiKey:
      type: object
      required: [id, provider, maskedKey, createdAt]
      properties:
        id:
          type: integer
        provider:
          type: string
          enum: [openai, anthropic, gemini]
        maskedKey:
          type: string
          description: Key with most characters masked (e.g. sk-...XXXX)
        lastUsedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    ApiKeyInput:
      type: object
      required: [provider, key]
      properties:
        provider:
          type: string
          enum: [openai, anthropic, gemini]
        key:
          type: string
          description: Raw API key (will be encrypted before storage)
